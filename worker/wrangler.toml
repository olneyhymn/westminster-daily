name = "westminster-daily-email"
main = "src/index.js"
compatibility_date = "2026-04-01"

# Run daily at 09:00 UTC — 1 hour after the Cloudflare Pages deploy
# workflow (04:00 EDT / 05:00 EST), which gives the site time to publish
# the fresh feed.rss before we read it.
[triggers]
crons = ["0 9 * * *"]

# Let us `import template from './template.html'` as a plain string.
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true
