name = "westminster-daily-email"
main = "src/index.js"
compatibility_date = "2026-04-01"

# Run daily at 09:00 UTC. The upstream Pages deploy workflow runs at
# 08:00 UTC (03:00 EST / 04:00 EDT), which gives the site roughly one
# hour to publish the fresh feed.rss before we read it. The buffer
# shrinks to one hour in EDT and expands to two hours in EST.
[triggers]
crons = ["0 9 * * *"]

[observability]
enabled = true

# Let us `import template from './template.html'` as a plain string.
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true
