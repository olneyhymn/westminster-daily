name = "westminster-daily-email"
main = "src/index.js"
compatibility_date = "2026-04-01"

# Run daily at 09:00 UTC. The upstream Pages deploy workflow is
# scheduled at 06:00 UTC via GitHub Actions, giving a ~3-hour buffer
# for the site to publish the fresh feed.rss (GH Actions cron can
# lag 30-60+ min). The worker also retries once after 5 min if the
# feed entry is missing.
[triggers]
crons = ["0 9 * * *"]

[observability]
enabled = true

# Let us `import template from './template.html'` as a plain string.
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true
